<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preliminary Assessment | Trinitas Careers</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="logo-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="careers.css">
</head>
<body class="assessment-shell">
    <header class="assessment-topbar">
        <div class="container assessment-topbar-inner">
            <div class="assessment-brand">
                <img src="logo-icon.png" alt="" class="assessment-brand-logo" width="36" height="36">
                <div>
                    <strong class="assessment-brand-title">Trinitas Assessment</strong>
                    <span class="assessment-attempt-badge" id="attempt-badge">Attempt 1</span>
                </div>
            </div>
            <div class="assessment-topbar-center">
                <div class="assessment-meta">
                    <span><span class="meta-label">Candidate</span> <strong id="candidate-name">—</strong></span>
                    <span><span class="meta-label">Email</span> <strong id="candidate-email">—</strong></span>
                    <span><span class="meta-label">Section</span> <strong id="section-name">—</strong></span>
                </div>
                <div class="assessment-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-bar">
                    <div class="assessment-progress-fill" id="progress-fill"></div>
                </div>
                <div class="assessment-progress-label" id="progress-label">Section 1 of 6</div>
            </div>
            <div class="assessment-topbar-right">
                <div class="assessment-session-actions">
                    <button type="button" class="btn btn-secondary btn-sm" id="btn-pause-session">Pause</button>
                    <button type="button" class="btn btn-secondary btn-sm" id="btn-end-session">End &amp; submit</button>
                </div>
                <div class="assessment-timer-wrap">
                    <span class="assessment-timer-label">Time remaining</span>
                    <span class="assessment-timer" id="global-timer">75:00</span>
                </div>
            </div>
        </div>
    </header>

    <div class="tab-warning" id="tab-warning" hidden>
        <div class="container tab-warning-inner">
            <span id="tab-warning-text">Stay on this tab during the assessment. Leaving the tab is monitored.</span>
        </div>
    </div>

    <main class="assessment-body">
        <div class="container">
            <div class="assessment-panel" id="assessment-content">
                <p class="section-desc">Loading assessment…</p>
            </div>
        </div>
    </main>

    <script src="assessment-aptitude.js"></script>
    <script src="assessment-data.js"></script>
    <script src="assessment-data-attempt2.js"></script>
    <script>if (window.__attachAssessmentAptitude) window.__attachAssessmentAptitude();</script>
    <script src="api.js"></script>
    <script src="assessment.js"></script>
</body>
</html>
